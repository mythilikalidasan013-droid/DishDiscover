<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DishDiscover</title>

<style>
:root {
  --primary: linear-gradient(135deg, #ff7e5f, #feb47b);
  --bg: #f9fafb;
  --card: #ffffff;
  --text: #2d3436;
  --accent: #ff6b6b;
}

body.dark {
  --bg: #1e272e;
  --card: #2f3640;
  --text: #f5f6fa;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px 20px;
}

.logo {
  font-size: 28px;
  font-weight: bold;
}

.logo span {
  background: var(--primary);
  -webkit-background-clip: text;
  color: transparent;
}

.tagline {
  font-size: 14px;
  opacity: 0.7;
}

/* SEARCH */
.search-box {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 20px;
}

input {
  padding: 12px;
  width: 250px;
  border-radius: 25px;
  border: none;
  outline: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  background: var(--primary);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: var(--card);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
}

.card-content {
  padding: 15px;
}

.heart {
  float: right;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: var(--card);
  padding: 20px;
  border-radius: 20px;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
}

/* LOADER */
.loader {
  text-align: center;
  display: none;
}

/* DARK MODE TOGGLE */
.toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleDark()">🌙</div>

<div class="header">
  <div class="logo">🍔 <span>DishDiscover</span></div>
  <div class="tagline">Find recipes in seconds 🍽️</div>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search recipes...">
  <button onclick="searchRecipes()">Search</button>
</div>

<div class="loader" id="loader">Loading...</div>
<div class="grid" id="results"></div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
const results = document.getElementById("results");
const loader = document.getElementById("loader");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

function toggleDark() {
  document.body.classList.toggle("dark");
}

/* SEARCH */
async function searchRecipes() {
  const query = document.getElementById("search").value;
  loader.style.display = "block";
  results.innerHTML = "";

  const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`);
  const data = await res.json();

  loader.style.display = "none";

  if (!data.meals) {
    results.innerHTML = "<p>No results found</p>";
    return;
  }

  data.meals.forEach(meal => {
    const card = document.createElement("div");
    card.className = "card";

    const fav = isFavorite(meal.idMeal) ? "❤️" : "🤍";

    card.innerHTML = `
      <img src="${meal.strMealThumb}">
      <div class="card-content">
        <h3>${meal.strMeal}</h3>
        <span class="heart" onclick="toggleFavorite('${meal.idMeal}', event)">${fav}</span>
      </div>
    `;

    card.onclick = () => openModal(meal);
    results.appendChild(card);
  });
}

/* MODAL */
function openModal(meal) {
  modal.style.display = "flex";

  let ingredients = "";
  for (let i = 1; i <= 20; i++) {
    if (meal[`strIngredient${i}`]) {
      ingredients += `<li>${meal[`strIngredient${i}`]}</li>`;
    }
  }

  modalContent.innerHTML = `
    <h2>${meal.strMeal}</h2>
    <h3>Ingredients</h3>
    <ul>${ingredients}</ul>
    <h3>Instructions</h3>
    <p>${meal.strInstructions}</p>
  `;
}

modal.onclick = () => modal.style.display = "none";

/* FAVORITES */
function getFavorites() {
  return JSON.parse(localStorage.getItem("favorites")) || [];
}

function isFavorite(id) {
  return getFavorites().includes(id);
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  let favs = getFavorites();

  if (favs.includes(id)) {
    favs = favs.filter(f => f !== id);
  } else {
    favs.push(id);
  }

  localStorage.setItem("favorites", JSON.stringify(favs));
  searchRecipes();
}
</script>

</body>
</html>
